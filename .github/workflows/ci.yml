name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install plink2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends plink2

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t array-lrr-gwas:test .

      - name: Verify CLI in container
        run: docker run --rm array-lrr-gwas:test --help

      - name: Verify plink2 in container
        run: docker run --rm --entrypoint sh array-lrr-gwas:test -lc "command -v plink2 && plink2 --version"
